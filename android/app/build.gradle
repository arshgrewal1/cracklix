plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}
android {
    namespace "com.cracklix.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.cracklix.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.5"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // navCheckDescriptor removed as it is invalid AGP DSL
        }
    }
    signingConfigs {
        release {
            // The keystore can be provided in two ways:
            //   1. CI restores it to android/app/keystore.jks (see workflow), OR a
            //      base64-encoded keystore is provided via the KEYSTORE_BASE64 env var.
            //   2. A local file whose path is given by KEYSTORE_PATH (defaults to keystore.jks).
            def keystorePath = System.getenv('KEYSTORE_PATH') ?: 'keystore.jks'
            def keystoreBase64 = System.getenv('KEYSTORE_BASE64')
            def resolvedKeystore = null
            if (keystoreBase64) {
                // Decode a base64 keystore into the build directory.
                def decoded = new File(buildDir, 'keystore.jks')
                decoded.parentFile.mkdirs()
                decoded.bytes = keystoreBase64.decodeBase64()
                resolvedKeystore = decoded
            } else if (file(keystorePath).exists()) {
                resolvedKeystore = file(keystorePath)
            }
            if (resolvedKeystore != null) {
                storeFile resolvedKeystore
                storePassword System.getenv('KEYSTORE_PASSWORD') ?: ''
                keyAlias System.getenv('KEY_ALIAS') ?: ''
                keyPassword System.getenv('KEY_PASSWORD') ?: ''
            } else {
                // No keystore available (e.g. plain local checkout). Leave the
                // signing config empty so debug builds still work; assembleRelease
                // will fail fast with a clear "no keystore" message in that case.
                println "[SIGNING] No keystore found (KEYSTORE_BASE64 unset and ${keystorePath} missing); release build will be unsigned."
            }
        }
    }
    buildTypes {
        release {
            // Only attach the signing config when a keystore is actually present,
            // otherwise Gradle errors on the empty storeFile reference.
            if (System.getenv('KEYSTORE_BASE64') || file(System.getenv('KEYSTORE_PATH') ?: 'keystore.jks').exists()) {
                signingConfig signingConfigs.release
            }
            // Enables code shrinking, obfuscation, and optimization for your release build.
            minifyEnabled true
            // Enables resource shrinking, which removes unused resources.
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        buildConfig true
    }
}
dependencies {
    implementation project(':capacitor-android')
    implementation project(':capacitor-app')
    implementation project(':capacitor-browser')
    implementation project(':capacitor-device')
    implementation project(':capacitor-filesystem')
    implementation project(':capacitor-keyboard')
    implementation project(':capacitor-network')
    implementation project(':capacitor-preferences')
    implementation project(':capacitor-share')
    implementation project(':capacitor-splash-screen')
    implementation project(':capacitor-status-bar')
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
