plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace "com.cracklix.app"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.cracklix.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.5"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // navCheckDescriptor removed as it is invalid AGP DSL
        }
    }

    signingConfigs {
        release {
            // Decode base64 keystore from GitHub secret or use local file
            def keystorePath = System.getenv('KEYSTORE_PATH') ?: 'release.jks'
            def keystoreBase64 = System.getenv('KEYSTORE_BASE64')
            
            if (keystoreBase64) {
                // Create temporary keystore from base64
                def keystoreFile = new File(buildDir, 'keystore.jks')
                keystoreFile.bytes = keystoreBase64.decodeBase64()
                storeFile keystoreFile
            } else if (new File(keystorePath).exists()) {
                storeFile file(keystorePath)
            }
            
            storePassword System.getenv('KEYSTORE_PASSWORD') ?: 'CrackLix@2026Release!'
            keyAlias System.getenv('KEY_ALIAS') ?: 'cracklix-release-key'
            keyPassword System.getenv('KEY_PASSWORD') ?: 'CrackLix@2026Release!'
        }
    }

    buildTypes {
        release {
            // Enables code shrinking, obfuscation, and optimization for your release build.
            minifyEnabled true
            
            // Enables resource shrinking, which removes unused resources.
            shrinkResources true 
            
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        buildConfig true
    }
}
