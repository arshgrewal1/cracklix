plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace "com.cracklix.app"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.cracklix.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.5"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // navCheckDescriptor removed as it is invalid AGP DSL
        }
    }

    signingConfigs {
        release {
            // The keystore can be provided in two ways:
            //   1. CI restores it to android/app/keystore.jks (see workflow).
            //   2. A local file whose path is given by KEYSTORE_PATH (defaults to release.jks).
            def keystorePath = System.getenv('KEYSTORE_PATH') ?: 'keystore.jks'
            def keystoreFile = file(keystorePath)

            if (keystoreFile.exists()) {
                storeFile keystoreFile
                storePassword System.getenv('KEYSTORE_PASSWORD') ?: ''
                keyAlias System.getenv('KEY_ALIAS') ?: ''
                keyPassword System.getenv('KEY_PASSWORD') ?: ''
            } else {
                // No keystore available (e.g. plain local checkout). Leave the
                // signing config empty so debug builds still work; assembleRelease
                // will fail fast with a clear "no keystore" message in that case.
                println "[SIGNING] No keystore found at ${keystoreFile.absolutePath}; release build will be unsigned."
            }
        }
    }

    buildTypes {
        release {
            // Only attach the signing config when a keystore is actually present,
            // otherwise Gradle errors on the empty storeFile reference.
            if (file(System.getenv('KEYSTORE_PATH') ?: 'keystore.jks').exists()) {
                signingConfig signingConfigs.release
            }

            // Enables code shrinking, obfuscation, and optimization for your release build.
            minifyEnabled true
            
            // Enables resource shrinking, which removes unused resources.
            shrinkResources true 
            
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        buildConfig true
    }
}
