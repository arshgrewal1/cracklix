pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = "android"
include ':app'

// Capacitor Plugins Inclusion
def capacitorPlugins = []
def pluginsJson = new groovy.json.JsonSlurper().parseText(new File(rootProject.projectDir, '../package.json').text)
if (pluginsJson.dependencies) {
    pluginsJson.dependencies.each { name, version ->
        if (name.startsWith('@capacitor/')) {
            capacitorPlugins << name
        }
    }
}

// Cordov Plugins Inclusion
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File(rootProject.projectDir, 'capacitor-cordova-android-plugins')