pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        // Move flatDir here to satisfy Capacitor plugin requirements centrally
        flatDir {
            dirs 'libs'
        }
    }
}
rootProject.name = 'android'
include ':app'
apply from: 'capacitor.settings.gradle'
