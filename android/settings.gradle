pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        flatDir {
            dirs 'app/libs', 'capacitor-cordova-android-plugins/src/main/libs'
        }
    }
}
rootProject.name = 'android'
include ':app'

apply from: 'capacitor.settings.gradle'
