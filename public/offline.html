<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline | Cracklix</title>
  <style>
    :root {
      --primary: #1677FF;
      --foreground: #0F172A;
      --slate-500: #64748B;
      --slate-100: #F1F5F9;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #FFFFFF;
      color: var(--foreground);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      padding: 24px;
      max-width: 400px;
      width: 100%;
    }
    .icon-box {
      width: 80px;
      height: 80px;
      background-color: #EEF4FF;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      box-shadow: 0 10px 25px -5px rgba(22, 119, 255, 0.1);
    }
    .icon-box svg {
      width: 40px;
      height: 40px;
      color: var(--primary);
    }
    h1 {
      font-size: 24px;
      font-weight: 900;
      margin: 0 0 12px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--slate-500);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
      margin: 0 0 40px;
    }
    .btn {
      background-color: var(--foreground);
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.2);
    }
    .btn:active {
      transform: scale(0.95);
    }
    .footer-text {
      position: absolute;
      bottom: 24px;
      font-size: 10px;
      font-weight: 800;
      color: #CBD5E1;
      text-transform: uppercase;
      letter-spacing: 0.3em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-box">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
        <path d="M1.42 9a16 11 0 0 1 21.16 0"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>No Connection</h1>
    <p>The preparation node is offline. Please check your internet connectivity and try again.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
  <div class="footer-text">Cracklix Registry</div>
</body>
</html>
