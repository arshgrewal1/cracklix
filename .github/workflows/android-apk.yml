name: Build Android APK - Production

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  GRADLE_OPTS: "-Xmx4096m -Dorg.gradle.jvmargs=-Xmx4096m"

jobs:
  analyze:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint -- --max-warnings 0
      
      - name: Run TypeScript check
        run: npm run typecheck
      
      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: analyze
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build:android
        env:
          NEXT_PUBLIC_ENVIRONMENT: production

      - name: Export to www
        run: |
          rm -rf www
          cp -r .next/static www/ || true
          cp -r public/* www/ || true

      - name: Sync Capacitor
        run: npx cap sync android --deployment

      # Decode and setup keystore for signing with hardening
      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret is missing or empty."
            exit 1
          fi
          mkdir -p ~/.android
          echo "$KEYSTORE_BASE64" | tr -d '\n ' | base64 -d > ~/.android/release.keystore
          
          # Validate keystore integrity
          keytool -list -v -keystore ~/.android/release.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}" || (echo "Keystore validation failed" && exit 1)

      # Build Release APK (Signed)
      - name: Build Signed Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -x bundleRelease \
            --no-daemon \
            --build-cache \
            -Pandroid.injected.signing.store.file=$HOME/.android/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      # Upload Signed Release APK
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-release-signed-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Create Release Notes
        run: |
          mkdir -p release-info
          echo "# Cracklix Release $(date +'%Y-%m-%d')" > release-info/RELEASE.md
          echo "Build: ${{ github.run_number }}" >> release-info/RELEASE.md
          echo "Commit: ${{ github.sha }}" >> release-info/RELEASE.md
          echo "Branch: ${{ github.ref_name }}" >> release-info/RELEASE.md

      - name: Upload Release Info
        uses: actions/upload-artifact@v4
        with:
          name: release-info
          path: release-info/
