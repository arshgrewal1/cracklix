name: Build Android APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build & Sign Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Cleanup Submodules
        run: |
          git config --local --unset-all core.sshCommand || true
          rm -f .gitmodules
          git rm --cached arsh 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}

      - name: Setup Capacitor Assets
        run: |
          # Capacitor requires a webDir folder to exist for sync
          # Even if loading from server.url, we create a placeholder index
          mkdir -p out
          echo '<script>window.location.href="https://cracklix.vercel.app"</script>' > out/index.html
          mkdir -p android/app/src/main/assets/public

      - name: Setup Google Services
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          else
            echo "{}" > android/app/google-services.json
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7