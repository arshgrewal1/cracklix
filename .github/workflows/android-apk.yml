name: Build Android APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build & Sign Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js Static Export
        run: npm run build

      - name: Ensure Android Native Directory Structure
        run: |
          mkdir -p out
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res/xml
          touch android/app/src/main/assets/.gitkeep

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android Production APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -x lint -x test --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-production-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Build Android App Bundle (AAB)
        working-directory: android
        run: ./gradlew bundleRelease -x lint -x test --no-daemon

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-production-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
