name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Sign Android APK
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Cleanup Broken Git References
        run: |
          git config --local --unset-all core.sshCommand || true
          rm -f .gitmodules
          git rm --cached arsh 2>/dev/null || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Dependencies
        run: npm ci

      - name: Debug Capacitor Package Presence
        run: |
          npm ls @capacitor/android || true
          ls -la node_modules/@capacitor/android/capacitor.settings.gradle || echo "MISSING: Capacitor Android Gradle script"

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}

      - name: Create Placeholder Web Assets
        run: |
          # Capacitor requires a webDir folder to exist for sync
          mkdir -p out
          echo '<script>window.location.href="https://cracklix.vercel.app"</script>' > out/index.html
          mkdir -p android/app/src/main/assets/public

      - name: Setup Google Services
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          else
            echo "{}" > android/app/google-services.json
          fi

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
