
name: Build & Sign Release Assets

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build:android

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: cd android && ./gradlew assembleRelease

      - name: Sign APK
        run: |
          # Add your signing logic here

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/cracklix.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: cracklix-apk
          path: android/app/build/outputs/apk/release/cracklix.apk
