name: Build Android APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build & Sign Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Bypasses fatal: No url found for submodule path 'arsh' in .gitmodules
          submodules: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js Static Export
        run: npm run build

      - name: Sync Capacitor
        run: |
          mkdir -p android/app/src/main/assets
          npx cap sync android

      - name: Setup Google Services
        # If the user has added this secret to GitHub, it will create the required file.
        # Otherwise, the build will still attempt to run but might fail if the plugin is active.
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON secret not found. Build may fail if Firebase plugin is enabled."
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
