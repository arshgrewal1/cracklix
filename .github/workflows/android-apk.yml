name: Build Android APK - Production

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript Check
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build:android

      - name: Export to www
        run: |
          rm -rf www
          mkdir -p www
          cp -r .next/static www/ || true
          cp -r public/* www/ || true

      - name: Sync Capacitor
        run: npx cap sync android

      # ✅ Keystore Setup
      - name: Setup Keystore
        run: |
          if [[ -n "${{ secrets.KEYSTORE_BASE64 }}" ]]; then
            echo "🔐 Decoding release keystore..."
            printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n ' | base64 -d > release.keystore
            echo "KEYSTORE_TYPE=RELEASE" >> $GITHUB_ENV
          else
            echo "⚠️ No keystore found, generating debug fallback..."
            mkdir -p ~/.android
            keytool -genkeypair -v \
              -keystore release.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "KEYSTORE_TYPE=DEBUG" >> $GITHUB_ENV
            echo "KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
          fi

      # ✅ Build Release APK
      - name: Build Android App
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      # ✅ Sign APK with apksigner (Mandatory for Android 11+ / V2/V3 Signature)
      - name: Sign & Align APK
        run: |
          UNSIGNED_APK=$(find android/app/build/outputs/apk/release -name "*-unsigned.apk" | head -n 1)
          if [[ -z "$UNSIGNED_APK" ]]; then
            UNSIGNED_APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          fi

          echo "📦 Unsigned APK found: $UNSIGNED_APK"
          
          BUILD_TOOLS_PATH=$(find $ANDROID_HOME/build-tools -name "apksigner" | head -n 1 | xargs dirname)
          echo "🛠️ Build Tools Path: $BUILD_TOOLS_PATH"

          # 1. Zipalign
          $BUILD_TOOLS_PATH/zipalign -v 4 "$UNSIGNED_APK" cracklix-aligned.apk

          # 2. Sign with apksigner (Supports V2/V3)
          if [[ "$KEYSTORE_TYPE" == "RELEASE" ]]; then
            $BUILD_TOOLS_PATH/apksigner sign --ks release.keystore \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              --out cracklix.apk cracklix-aligned.apk
          else
            $BUILD_TOOLS_PATH/apksigner sign --ks release.keystore \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --key-pass "pass:$KEY_PASSWORD" \
              --out cracklix.apk cracklix-aligned.apk
          fi
          
          # 3. Verify
          $BUILD_TOOLS_PATH/apksigner verify --verbose cracklix.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-build
          path: cracklix.apk
