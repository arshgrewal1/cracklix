name: Build Android APK - Production

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app (Static Export)
        run: npm run build:android

      - name: Verify Web Assets
        run: |
          echo "📂 Root Directory Contents:"
          ls -la
          echo "🔍 Checking for 'out' directory..."
          if [ ! -d "out" ]; then
            echo "❌ ERROR: Static export directory 'out' missing. Build failed."
            exit 1
          fi
          echo "🔍 Checking for 'out/index.html'..."
          if [ ! -f "out/index.html" ]; then
            echo "❌ ERROR: 'out/index.html' not found. Static export is incomplete."
            exit 1
          fi
          echo "✅ Static Export Verified."

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Keystore
        run: |
          if [[ -n "${{ secrets.KEYSTORE_BASE64 }}" ]]; then
            echo "🔐 Decoding release keystore..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            echo "KEYSTORE_TYPE=RELEASE" >> $GITHUB_ENV
          else
            echo "⚠️ No keystore found, generating debug fallback..."
            keytool -genkeypair -v \
              -keystore android/app/release.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "KEYSTORE_TYPE=DEBUG" >> $GITHUB_ENV
          fi

      - name: Build Android App
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -x lint -x test --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'androiddebugkey' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}

      - name: Sign & Align APK
        run: |
          UNSIGNED_APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "📦 APK found: $UNSIGNED_APK"
          
          BUILD_TOOLS_PATH=$(find $ANDROID_HOME/build-tools -name "apksigner" | head -n 1 | xargs dirname)
          
          # Zipalign
          $BUILD_TOOLS_PATH/zipalign -v 4 "$UNSIGNED_APK" cracklix-aligned.apk

          # Sign with apksigner (V2/V3 schemes)
          if [[ "$KEYSTORE_TYPE" == "RELEASE" ]]; then
            $BUILD_TOOLS_PATH/apksigner sign --ks android/app/release.keystore \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              --out cracklix-production.apk cracklix-aligned.apk
          else
            $BUILD_TOOLS_PATH/apksigner sign --ks android/app/release.keystore \
              --ks-key-alias "androiddebugkey" \
              --ks-pass "pass:android" \
              --key-pass "pass:android" \
              --out cracklix-production.apk cracklix-aligned.apk
          fi
          
          $BUILD_TOOLS_PATH/apksigner verify --verbose cracklix-production.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-production-apk
          path: cracklix-production.apk
