
name: Build Signed Android Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Sign Release Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}

      - name: Capacitor Sync
        run: |
          mkdir -p out
          echo '<script>window.location.href="https://cracklix.vercel.app"</script>' > out/index.html
          npx cap sync android

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-key.jks

      - name: Build Signed Assets (APK & AAB)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-signed-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-signed-bundle
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
