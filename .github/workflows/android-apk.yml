name: Build Android APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build & Sign Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Verify Web Assets
        run: |
          if [ ! -d "out" ]; then
            echo "Error: Next.js export directory 'out' missing. Production build failed."
            exit 1
          fi

      - name: Setup Android Assets
        run: |
          mkdir -p android/app/src/main/assets/public

      - name: Setup Google Services
        run: |
          # Ensure we remove directory if it exists due to previous failed runs
          rm -rf android/app/google-services.json
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          else
            echo "{}" > android/app/google-services.json
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7