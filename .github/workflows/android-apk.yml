name: Build Android APK - Production

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript Check
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build:android

      - name: Export to www
        run: |
          rm -rf www
          mkdir -p www
          cp -r .next/static www/ || true
          cp -r public/* www/ || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Keystore
        run: |
          if [[ -n "${{ secrets.KEYSTORE_BASE64 }}" ]]; then
            echo "Decoding Release Keystore..."
            printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
            echo "KEYSTORE_TYPE=RELEASE" >> $GITHUB_ENV
          else
            echo "No Release Keystore secret found. Generating temporary debug keystore..."
            mkdir -p ~/.android
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "KEYSTORE_TYPE=DEBUG" >> $GITHUB_ENV
          fi

      - name: Verify Keystore Integrity
        run: |
          if [[ "$KEYSTORE_TYPE" == "RELEASE" ]]; then
            ls -la release.keystore
            keytool -list -v -keystore release.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | grep Alias
          else
            ls -la ~/.android/debug.keystore
            keytool -list -v -keystore ~/.android/debug.keystore -storepass android | grep Alias
          fi

      - name: Build Android App
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Sign APK (Jarsigner)
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          if [[ -z "$APK_PATH" ]]; then
            echo "Error: No APK found to sign"
            exit 1
          fi
          echo "Discovered APK: $APK_PATH"
          
          if [[ "$KEYSTORE_TYPE" == "RELEASE" ]]; then
            echo "Signing with Release Keystore..."
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore release.keystore \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              "$APK_PATH" "${{ secrets.KEY_ALIAS }}"
          else
            echo "Signing with Debug Keystore..."
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -keypass android \
              "$APK_PATH" androiddebugkey
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-build
          path: android/app/build/outputs/apk/**/*.apk
