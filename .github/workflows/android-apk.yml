name: Build Signed Android Release

on:
  push:
    branches: [ main ]
  # Allow running the build manually from the Actions tab.
  workflow_dispatch:

permissions:
  # Required so the workflow can create/update the GitHub Release that hosts the APK.
  contents: write

jobs:
  build:
    name: Build & Sign Release Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # The Android bundle is produced with `output: 'export'` (BUILD_TARGET=android).
      # Static export is incompatible with server-only code (API route handlers,
      # 'use server' actions and middleware), so we temporarily move those paths
      # aside for the export only. They stay in the repo for the server/Vercel
      # build and are restored immediately after the export. At runtime the APK
      # loads the live site via server.url in capacitor.config.ts, so this
      # exported bundle is only a placeholder required by `npx cap sync`.
      - name: Stash server-only code for static export
        run: |
          mkdir -p .ci-stash
          [ -d src/app/api ] && mv src/app/api .ci-stash/api || true
          [ -f src/middleware.ts ] && mv src/middleware.ts .ci-stash/middleware.ts || true
          # Stash 'use server' AI flow files and replace with no-op stubs
          # so client-side imports still resolve during the static build.
          # Stubs are generated dynamically: every exported async function gets
          # a no-op replacement that returns an empty object, and every exported
          # type/interface is re-exported as `any`. This way new flow files are
          # handled automatically without updating the workflow.
          mkdir -p .ci-stash/flows
          for f in src/ai/flows/*.ts; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            mv "$f" .ci-stash/flows/
            # Build a stub by scanning the original for exported symbols
            stub=""
            while IFS= read -r name; do
              stub="${stub}export async function ${name}(..._args: any[]): Promise<any> { return {}; }\n"
            done < <(grep -oP '(?<=export async function )\w+' ".ci-stash/flows/$base")
            while IFS= read -r name; do
              stub="${stub}export type ${name} = any;\n"
            done < <(grep -oP '(?<=export type )\w+' ".ci-stash/flows/$base")
            printf '%b' "$stub" > "src/ai/flows/$base"
          done

      - name: Build Web Assets (static export)
        run: npm run build:android
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}

      - name: Restore server-only code
        if: always()
        run: |
          [ -d .ci-stash/api ] && mv .ci-stash/api src/app/api || true
          [ -f .ci-stash/middleware.ts ] && mv .ci-stash/middleware.ts src/middleware.ts || true
          # Restore real AI flow files over the stubs
          if [ -d .ci-stash/flows ]; then
            for f in .ci-stash/flows/*.ts; do
              [ -f "$f" ] && mv "$f" src/ai/flows/ || true
            done
          fi
          rm -rf .ci-stash

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Restore Keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. Cannot sign the release APK."
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          echo "Keystore restored to android/app/keystore.jks"

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/*.apk dist/cracklix.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-release-apk
          path: dist/cracklix.apk
          retention-days: 7

      # Publish the signed APK as a stable GitHub Release asset. The website
      # links to this URL for the automatic download, so the file is served
      # from Releases (not committed to the repo, avoiding history bloat).
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Cracklix Latest APK
          files: dist/cracklix.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
